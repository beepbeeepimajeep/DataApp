models:
  sonnet:
    provider: anthropic
    model: claude-sonnet-4-6
    temperature: 0.6
    max_tokens: 16384
    top_p: 0.95
  gpt5_4:
    provider: openai
    model: gpt-5.4
    temperature: 0.6
    max_tokens: 16384
    top_p: 0.95
  gpt_oss:
    provider: tritonai
    model: api-gpt-oss-120b
    temperature: 0.6
    max_tokens: 16384
    top_p: 0.95
    base_url: https://tritonai-api.ucsd.edu/v1

paths:
  data_dir: "."
  input_file: "private.jsonl"
  output_dir: "dataapp_outputs"
  manifest_file: "dataset_manifest.jsonl"

execution:
  max_retries: 3
  retry_backoff_seconds: 2

validation:
  sample_size: 45
  stratification:
    mcq: 15
    single_free: 15
    multi_free: 15
  min_format_compliance: 0.95
  min_multibox_accuracy: 0.90
  min_agreement_rate: 0.40
  max_no_box_rate: 0.05

cost_tracking:
  alert_thresholds: [10, 25, 50, 75]

logging:
  level: "INFO"
  format: "[%(asctime)s] %(name)s - %(levelname)s - %(message)s"
